<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audio Drop</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #0d0d0d;
  color: #fff;
}

.container {
  max-width: 800px;
  margin: auto;
  padding: 20px;
}

h1 {
  text-align: center;
  margin-bottom: 30px;
}

.card {
  background: #151515;
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 20px;
}

input, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
}

input {
  background: #1f1f1f;
  color: #fff;
}

button {
  background: #fff;
  color: #000;
  font-weight: 600;
  cursor: pointer;
}

.audio-card {
  margin-top: 15px;
}

audio {
  width: 100%;
  margin-top: 10px;
}

.download {
  display: inline-block;
  margin-top: 8px;
  font-size: 14px;
  color: #aaa;
  text-decoration: none;
}
</style>
</head>

<body>

<div class="container">
  <h1>🎧 Audio Drop</h1>

  <div class="card">
    <h3>Upload Audio</h3>
    <input type="text" id="author" placeholder="Nama DJ / Author">
    <input type="file" id="file" accept="audio/*">
    <button onclick="uploadAudio()">Upload</button>
  </div>

  <div class="card">
    <h3>Audio List (25 terbaru)</h3>
    <div id="list">Loading...</div>
  </div>
</div>

<script>
const CLOUD_NAME = "dzbpzdqao";
const UPLOAD_PRESET = "YOUR_UPLOAD_PRESET";

// ================= UPLOAD =================
async function uploadAudio() {
  const author = document.getElementById("author").value.trim();
  const file = document.getElementById("file").files[0];

  if (!author || !file) {
    alert("Isi semua dulu bro");
    return;
  }

  const ext = file.name.split('.').pop();
  const renamedFile = new File([file], author.toLowerCase() + "." + ext, { type: file.type });

  const formData = new FormData();
  formData.append("file", renamedFile);
  formData.append("upload_preset", UPLOAD_PRESET);
  formData.append("public_id", author.toLowerCase());

  try {
    await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`, {
      method: "POST",
      body: formData
    });

    alert("Upload berhasil 🔥");
    loadAudios();

  } catch (err) {
    alert("Upload gagal");
  }
}

// ================= RENDER =================
function addToList(name, url) {
  const div = document.createElement("div");
  div.className = "audio-card";

  div.innerHTML = `
    <strong>${name}</strong>
    <audio controls src="${url}"></audio>
    <a class="download" href="${url}" download="${name}.mp3">Download</a>
  `;

  document.getElementById("list").appendChild(div);
}

// ================= LOAD =================
async function loadAudios() {
  const list = document.getElementById("list");
  list.innerHTML = "Loading...";

  try {
    const res = await fetch("/api/audio");
    const data = await res.json();

    list.innerHTML = "";

    if (!data.length) {
      list.innerHTML = "Belum ada audio 😢";
      return;
    }

    data
      .sort((a, b) => new Date(b.created) - new Date(a.created))
      .slice(0, 25)
      .forEach(item => addToList(item.name, item.url));

  } catch (err) {
    list.innerHTML = "Gagal load audio";
  }
}

// auto load
loadAudios();

// optional auto refresh
setInterval(loadAudios, 10000);
</script>

</body>
</html>
