<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audio Drop</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #0d0d0d;
  color: #fff;
}

.container {
  max-width: 800px;
  margin: auto;
  padding: 20px;
}

h1 {
  text-align: center;
  font-weight: 600;
  margin-bottom: 30px;
}

.card {
  background: #151515;
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 20px;
  box-shadow: 0 0 20px rgba(255,255,255,0.05);
}

input, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  outline: none;
}

input {
  background: #1f1f1f;
  color: #fff;
}

button {
  background: #ffffff;
  color: #000;
  font-weight: 600;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  opacity: 0.8;
}

.audio-card {
  margin-top: 15px;
}

audio {
  width: 100%;
  margin-top: 10px;
}

.download {
  display: inline-block;
  margin-top: 10px;
  font-size: 14px;
  text-decoration: none;
  color: #aaa;
}
</style>
</head>

<body>

<div class="container">
  <h1>🎧 Audio Drop</h1>

  <!-- Upload -->
  <div class="card">
    <h3>Upload Audio</h3>
    <input type="text" id="author" placeholder="Nama DJ / Author">
    <input type="file" id="file" accept="audio/*">
    <button onclick="uploadAudio()">Upload</button>
  </div>

  <!-- List -->
  <div class="card">
    <h3>Audio List</h3>
    <div id="list"></div>
  </div>
</div>

<script>
const CLOUD_NAME = "dzbpzdqao";
const UPLOAD_PRESET = "akmal_pending_9x7";

// Upload audio
async function uploadAudio() {
  const author = document.getElementById("author").value.trim();
  const fileInput = document.getElementById("file");
  const file = fileInput.files[0];

  if (!author || !file) {
    alert("Isi nama & pilih audio dulu bro");
    return;
  }

  // Rename file
  const ext = file.name.split('.').pop();
  const newFileName = author.toLowerCase() + "." + ext;
  const renamedFile = new File([file], newFileName, { type: file.type });

  const formData = new FormData();
  formData.append("file", renamedFile);
  formData.append("upload_preset", UPLOAD_PRESET);
  formData.append("public_id", author.toLowerCase()); // biar jadi cecep.mp3

  try {
    const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`, {
      method: "POST",
      body: formData
    });

    const data = await res.json();
    addToList(author, data.secure_url);

    alert("Upload berhasil 🔥");
  } catch (err) {
    console.error(err);
    alert("Upload gagal");
  }
}

// Tambah ke UI
function addToList(name, url) {
  const list = document.getElementById("list");

  const div = document.createElement("div");
  div.className = "audio-card";

  div.innerHTML = `
    <strong>${name}</strong>
    <audio controls src="${url}"></audio>
    <a class="download" href="${url}" download="${name}.mp3">Download</a>
  `;

  list.prepend(div);
}
</script>

</body>
</html>
